# ============================================================
# 开发环境配置
# ============================================================
spring:
  # H2 内存数据库 — 开发用，无需安装
  datasource:
    url: jdbc:h2:mem:devdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA 配置 — SP3 使用 jakarta.persistence
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 控制台 — 浏览器访问 /h2-console 查看数据库
  h2:
    console:
      enabled: true
      path: /h2-console

  # SQL 初始化
  sql:
    init:
      mode: always

server:
  port: 8080
